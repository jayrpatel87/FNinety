services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: FalseNinety
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: